<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>goPGP — Open-Source PGP Encryption for Mobile</title>
    <meta name="description" content="Encrypt, decrypt, sign and verify on iOS and Android — powered by a single audited crypto engine. Free, open-source, zero tracking." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gopgp.org/" />
    <meta property="og:title" content="goPGP — Open-Source PGP Encryption for Mobile" />
    <meta property="og:description" content="Encrypt, decrypt, sign and verify on iOS and Android — powered by a single audited crypto engine. Free, open-source, zero tracking." />
    <meta property="og:image" content="https://gopgp.org/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="goPGP — Open-Source PGP Encryption for Mobile" />
    <meta name="twitter:description" content="Encrypt, decrypt, sign and verify on iOS and Android — powered by a single audited crypto engine. Free, open-source, zero tracking." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Theme color -->
    <meta name="theme-color" content="#059669" />

    <!-- Blocking theme init — prevents flash and ensures .dark class is set before paint -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
